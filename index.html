 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>FitForge AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #060810;
      --surface: #0c0e1a;
      --card: #101220;
      --border: #1c1f35;
      --border2: #252845;
      --accent: #4285f4;
      --accent2: #ff6b9d;
      --accent3: #06d6a0;
      --accent4: #ffd166;
      --text: #e2e4f0;
      --muted: #4a4f70;
      --muted2: #6b72a0;
      --syne: 'Syne', sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    body { background:var(--bg); color:var(--text); font-family:var(--syne); min-height:100vh; overflow-x:hidden; }
    
    /* Header & Badges */
    .header {
      position:sticky; top:0; z-index:100;
      display:flex; align-items:center; justify-content:space-between;
      padding:0 20px; height:64px;
      background:rgba(6,8,16,0.9); backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
    }
    .logo { font-size:18px; font-weight:800; }
    .logo em { color:var(--accent); font-style:normal; }
    .live-badge {
      display:flex; align-items:center; gap:6px;
      font-family:var(--mono); font-size:9px; color:var(--accent3);
      background:rgba(6,214,160,0.08); border:1px solid rgba(6,214,160,0.2);
      padding:4px 10px; border-radius:20px;
    }

    /* Wrap & Layout */
    .wrap { position:relative; z-index:1; max-width:600px; margin:0 auto; padding:20px 16px 100px; }
    .hero { margin-bottom:30px; text-align: center; }
    .hero h1 { font-size:32px; font-weight:800; line-height:1.1; margin-bottom:10px; }
    .hero h1 span { color:var(--accent); }
    .hero p { font-family:var(--mono); font-size:12px; color:var(--muted2); }

    /* Cards & Inputs */
    .card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:20px; margin-bottom:20px; }
    .sec-label { font-family:var(--mono); font-size:9px; letter-spacing:3px; text-transform:uppercase; color:var(--accent); margin-bottom:15px; display:flex; align-items:center; gap:10px; }
    .sec-label::after { content:''; flex:1; height:1px; background:var(--border); }

    .grid { display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-bottom:12px; }
    .field { display:flex; flex-direction:column; gap:6px; }
    .field label { font-family:var(--mono); font-size:9px; color:var(--muted2); text-transform:uppercase; }
    .field input, .field select {
      background:var(--surface); border:1px solid var(--border); border-radius:10px;
      color:var(--text); padding:12px; font-size:15px; font-family:var(--syne); outline:none; width:100%;
    }
    .field input:focus { border-color:var(--accent); }

    /* Stats Display */
    .stat-row { display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-top:15px; }
    .stat-box { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:12px; text-align:center; }
    .stat-val { font-family:var(--mono); font-size:18px; color:var(--accent); }
    .stat-lbl { font-size:8px; color:var(--muted); text-transform:uppercase; margin-top:4px; }

    /* Action Button */
    .btn-generate {
      width:100%; background:var(--accent); color:#fff; border:none; border-radius:12px;
      padding:16px; font-family:var(--syne); font-size:16px; font-weight:700;
      cursor:pointer; margin-top:10px; transition: 0.2s;
    }
    .btn-generate:active { transform:scale(0.97); opacity:0.8; }

    /* Tabs for Mobile */
    .tabs { display:flex; gap:5px; overflow-x:auto; padding-bottom:10px; margin-bottom:20px; scrollbar-width:none; }
    .tab-btn { 
        background:var(--surface); border:1px solid var(--border); color:var(--muted2); 
        padding:10px 18px; border-radius:10px; font-size:11px; white-space:nowrap; font-family:var(--mono);
    }
    .tab-btn.active { background:var(--accent); color:white; border-color:var(--accent); }

    /* Result Content */
    .plan-section-title { font-family:var(--mono); font-size:10px; color:var(--accent); padding:8px 0; border-bottom:1px solid var(--border); margin-bottom:12px; text-transform:uppercase; letter-spacing:1px; }
    .plan-body { font-size:14px; line-height:1.6; }
    .plan-body h3 { color:var(--accent4); margin:15px 0 8px; font-size:16px; }
    .plan-body ul { list-style:none; }
    .plan-body li { padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.05); color:var(--text); }
    
    /* Loading */
    .loading-wrap { text-align:center; padding:40px 20px; }
    .spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 1s infinite linear; margin:0 auto 20px; }
    @keyframes spin { to { transform:rotate(360deg); } }

    .hidden { display:none; }
  </style>
</head>
<body>

<header class="header">
  <div class="logo">Fit<em>Forge</em> AI</div>
  <div class="live-badge">PRO ACTIVE</div>
</header>

<div class="wrap">
  <div class="hero">
    <h1>Personal <span>Coach</span></h1>
    <p>AI-Powered Fitness & Nutrition</p>
  </div>

  <div class="card" id="formCard">
    <div class="sec-label">Physical Profile</div>
    <div class="grid">
      <div class="field"><label>Age</label><input type="number" id="age" placeholder="22"></div>
      <div class="field"><label>Gender</label><select id="gender"><option value="male">Male</option><option value="female">Female</option></select></div>
    </div>
    <div class="grid">
      <div class="field"><label>Weight (kg)</label><input type="number" id="weight" placeholder="70"></div>
      <div class="field"><label>Height (cm)</label><input type="number" id="height" placeholder="175"></div>
    </div>
    
    <div class="sec-label">Objectives</div>
    <div class="field" style="margin-bottom:12px">
        <label>Goal</label>
        <select id="goal">
            <option value="muscle_gain">Muscle Gain</option>
            <option value="fat_loss">Fat Loss</option>
            <option value="strength">Pure Strength</option>
        </select>
    </div>
    <div class="grid">
        <div class="field"><label>Target (kg)</label><input type="number" id="target" placeholder="75"></div>
        <div class="field"><label>Days/Week</label><select id="days"><option>3</option><option>4</option><option selected>5</option><option>6</option></select></div>
    </div>

    <div id="live-stats" class="stat-row hidden"></div>
    
    <button class="btn-generate" onclick="generate()">GENERATE PLAN</button>
  </div>

  <div id="loading" class="loading-wrap hidden">
    <div class="spinner"></div>
    <p style="font-family:var(--mono); font-size:12px; color:var(--accent)">Analyzing Biology & Training Science...</p>
  </div>

  <div id="results" class="hidden">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('workout', this)">WORKOUT</button>
      <button class="tab-btn" onclick="switchTab('diet', this)">DIET</button>
      <button class="tab-btn" onclick="switchTab('stats', this)">STATS</button>
      <button class="tab-btn" onclick="switchTab('tips', this)">TIPS</button>
    </div>
    <div id="tab-workout"></div>
    <div id="tab-diet" class="hidden"></div>
    <div id="tab-stats" class="hidden"></div>
    <div id="tab-tips" class="hidden"></div>
    
    <button class="btn-generate" style="background:var(--surface); border:1px solid var(--border)" onclick="location.reload()">CREATE NEW PLAN</button>
  </div>
</div>

<script>
const API_KEY = "AIzaSyCw58SRc_eLITplYGbGzBE4zEKEc9kgPic"; // Your Key Embedded

// Live BMI Calculation
['weight','height'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
        const w = +document.getElementById('weight').value;
        const h = +document.getElementById('height').value;
        if(w && h) {
            const bmi = (w/((h/100)**2)).toFixed(1);
            const stats = document.getElementById('live-stats');
            stats.innerHTML = `<div class="stat-box"><div class="stat-val">${bmi}</div><div class="stat-lbl">Current BMI</div></div>
                               <div class="stat-box"><div class="stat-val">${document.getElementById('days').value}</div><div class="stat-lbl">Days / Week</div></div>`;
            stats.classList.remove('hidden');
        }
    });
});

async function generate() {
    const data = {
        age: document.getElementById('age').value,
        weight: document.getElementById('weight').value,
        height: document.getElementById('height').value,
        goal: document.getElementById('goal').value,
        target: document.getElementById('target').value,
        days: document.getElementById('days').value
    };

    if(!data.age || !data.weight) return alert("Please fill in your profile.");

    document.getElementById('formCard').classList.add('hidden');
    document.getElementById('loading').classList.remove('hidden');

    const prompt = `Act as a world-class fitness coach. Create a plan for a ${data.age}y/o, ${data.weight}kg, ${data.height}cm person aiming for ${data.goal} (target: ${data.target}kg) training ${data.days} days/week. 
    Format using these exact ## headings:
    ## Workout Plan
    ## Diet Plan
    ## Calorie Targets
    ## Pro Tips`;

    try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });

        const result = await response.json();
        const text = result.candidates[0].content.parts[0].text;
        parseAndDisplay(text);
    } catch (e) {
        alert("Error generating plan. Check connection.");
        location.reload();
    }
}

function parseAndDisplay(text) {
    const sections = text.split('##');
    
    const findContent = (keyword) => {
        const section = sections.find(s => s.toLowerCase().includes(keyword.toLowerCase()));
        return section ? section.split('\n').slice(1).join('\n') : "Plan pending...";
    };

    document.getElementById('tab-workout').innerHTML = renderCard("Training Split", findContent("Workout"));
    document.getElementById('tab-diet').innerHTML = renderCard("Meal Plan", findContent("Diet"));
    document.getElementById('tab-stats').innerHTML = renderCard("Body Metrics", findContent("Calorie"));
    document.getElementById('tab-tips').innerHTML = renderCard("Expert Advice", findContent("Tips"));

    document.getElementById('loading').classList.add('hidden');
    document.getElementById('results').classList.remove('hidden');
}

function renderCard(title, content) {
    // Simple markdown to HTML
    const formatted = content
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/^\- (.*$)/gim, '<li>$1</li>')
        .replace(/\n/g, '<br>');

    return `<div class="card">
        <div class="plan-section-title">${title}</div>
        <div class="plan-body">${formatted}</div>
    </div>`;
}

function switchTab(tab, btn) {
    ['workout', 'diet', 'stats', 'tips'].forEach(t => {
        document.getElementById('tab-' + t).classList.add('hidden');
    });
    document.getElementById('tab-' + tab).classList.remove('hidden');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}
</script>

</body>
</html>
